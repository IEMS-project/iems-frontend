name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'compose.yml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_GATEWAY_URL=${{ vars.VITE_GATEWAY_URL }}
            VITE_CHATBOT_URL=${{ vars.VITE_CHATBOT_URL }}
            VITE_NOTIFICATION_URL=${{ vars.VITE_NOTIFICATION_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_REDIRECT_URI=${{ vars.VITE_GOOGLE_REDIRECT_URI }}
            VITE_GITHUB_CLIENT_ID=${{ vars.VITE_GITHUB_CLIENT_ID }}
            VITE_GITHUB_REDIRECT_URI=${{ vars.VITE_GITHUB_REDIRECT_URI }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
          tags: ${{ vars.DOCKER_USERNAME }}/iems-frontend:latest,${{ vars.DOCKER_USERNAME }}/iems-frontend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: aws_deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: "~/iems/frontend"

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/iems/frontend

            cat > ~/iems/frontend/.env << EOF
            IMAGE_NAME=${{ vars.DOCKER_USERNAME }}/iems-frontend:latest
            HOST_PORT=${{ vars.FRONTEND_HOST_PORT }}
            EOF

            chmod 600 ~/iems/frontend/.env
            cd ~/iems/frontend

            docker network create iems-network || true
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
            echo "Frontend deployment completed!"
