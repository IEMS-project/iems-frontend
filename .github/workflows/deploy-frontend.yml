name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - "compose.yml"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push-deploy:
    name: Build, push and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_GATEWAY_URL=/api
            VITE_CHATBOT_URL=/api/ai-service
            VITE_NOTIFICATION_URL=/api/notification-service
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_REDIRECT_URI=https://iems.io.vn/login
            VITE_GITHUB_CLIENT_ID=${{ vars.VITE_GITHUB_CLIENT_ID }}
            VITE_GITHUB_REDIRECT_URI=https://iems.io.vn/login
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/iems-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/iems-frontend:${{ github.sha }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: compose.yml
          target: ~/iems-frontend

      - name: Deploy frontend on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/iems-frontend

            cat > ~/iems-frontend/.env << EOF
            IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/iems-frontend:latest
            HOST_PORT=127.0.0.1:8083
            EOF

            cd ~/iems-frontend
            sudo docker network create iems-network || true
            sudo docker compose --env-file .env -f compose.yml pull frontend
            sudo docker compose --env-file .env -f compose.yml up -d --force-recreate frontend
            sudo docker image prune -f
